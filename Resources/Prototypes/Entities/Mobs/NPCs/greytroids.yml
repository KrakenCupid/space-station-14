- type: entity
  name: greytroid
  id: BaseMobGreytroid
  parent: [ SimpleSpaceMobBase, FlyingMobBase, MobCombat ]
  description: 
  abstract: true
  components:
    - type: InputMover
    - type: MobMover
    - type: HTN
      rootTask:
        task: SimpleHostileCompound
      blackboard:
        NavSmash: !type:Bool
          true
    - type: NpcFactionMember
      factions:
        - SimpleHostile
    - type: Sprite
      drawdepth: Mobs
      sprite: Mobs/Aliens/Carps/space.rsi
      layers:
      - map: [ "enum.DamageStateVisualLayers.Base" ]
        state: alive
    - type: CombatMode
    - type: Physics
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.40
          density: 80
          mask:
            - FlyingMobMask
          layer:
            - FlyingMobLayer
    - type: MobState
    - type: MobThresholds
      thresholds:
        0: Alive
        50: Dead
    - type: Stamina
      critThreshold: 100
    - type: DamageStateVisuals
      states:
        Alive:
          Base: alive
          BaseUnshaded: mouth
        Dead:
          Base: dead
          BaseUnshaded: dead_mouth
    - type: Butcherable
      spawned:
        - id: FoodMeatFish
          amount: 2
    - type: MeleeWeapon
      altDisarm: false
      angle: 0
      animation: WeaponArcBite
      soundHit:
        path: /Audio/Effects/bite.ogg
      damage:
        types:
          Piercing: 5
          Slash: 10
    - type: TypingIndicator
      proto: alien
    - type: Tag
      tags:
        - Carp
        - DoorBumpOpener
    - type: ReplacementAccent
      accent: genericAggressive
    - type: Speech
      speechVerb: LargeMob
    - type: InteractionPopup
      interactSuccessString: petting-success-carp
      interactFailureString: petting-failure-carp
      interactFailureSound:
        path: /Audio/Effects/bite.ogg

- type: entity
  name: robotic assistant
  id: MobGreytroidAssistant
  parent: BaseMobGreytroid
  description: An old nanotransen assistant android.
  components:
    - type: MobThresholds
      thresholds:
        0: Alive
        75: Dead
    - type: MeleeWeapon
      damage:
        types:
          Blunt: 10

  - type: entity
  name: robotic packer
  id: MobGreytroidPacker
  parent: BaseMobGreytroid
  description: An outdated model of silicon, used in factories and mail centers.
  components:
    - type: MobThresholds
      thresholds:
        0: Alive
        85: Dead
    - type: MeleeWeapon
      damage:
        types:
          Blunt: 15

  - type: entity
  name: robotic lifter
  id: MobGreytroidLifter
  parent: BaseMobGreytroid
  description: A robotic worker from before the time of RIPLEYs. Recalled due to safety concerns.
  components:
    - type: MobThresholds
      thresholds:
        0: Alive
        200: Dead
    - type: MeleeWeapon
      damage:
        groups:
          Brute: 20

  - type: entity
  name: siliking
  id: MobSiliking
  parent: BaseMobGreytroid
  description: Mass of wires, cables and blinking lights.
  components:
    - type: MobThresholds
      thresholds:
        0: Alive
        700: Dead
    - type: MeleeWeapon
      damage:
        groups:
          Brute: 5
        types:
          Shock: 15

- type: entity
  id: MobGreytroidAssistantDungeon
  parent: MobGreytroidAssistant
  suffix: Dungeon
  components:
    - type: MeleeWeapon
      damage:
        types:
          Blunt: 4

  - type: entity
  id: MobGreytroidPackerDungeon
  parent: MobGreytroidPacker
  suffix: Dungeon
  components:
    - type: MeleeWeapon
      damage:
        types:
          Blunt: 6

  - type: entity
  id: MobGreytroidLifterDungeon
  parent: MobGreytroidLifter
  suffix: Dungeon
  components:
    - type: MeleeWeapon
      damage:
        groups:
          Brute: 10

  - type: entity
  id: MobSilikingDungeon
  parent: MobSiliking
  suffix: Dungeon
  components:
    - type: MobThresholds
      thresholds:
        0: Alive
        450: Dead
    - type: MeleeWeapon
      damage:
        groups:
          Brute: 1
        types:
          Shock: 9
